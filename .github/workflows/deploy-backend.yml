name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

env:
  GCP_PROJECT_ID: portfolio-projects-491501
  GCP_REGION: us-central1
  SERVICE_NAME: stackly-backend
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE_PATH: us-central1-docker.pkg.dev/portfolio-projects-491501/portfolio-backends/stackly-backend

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity Federation ──
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ── Configure Docker to use GCP Artifact Registry ──
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      # ── Build Docker image ──
      - name: Build Docker image
        working-directory: backend
        run: |
          docker build \
            --tag ${{ env.IMAGE_PATH }}:${{ github.sha }} \
            --tag ${{ env.IMAGE_PATH }}:latest \
            .

      # ── Push to Artifact Registry ──
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_PATH }}:${{ github.sha }}
          docker push ${{ env.IMAGE_PATH }}:latest

      # ── Deploy to Cloud Run ──
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_PATH }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 60 \
            --set-env-vars NODE_ENV=production \
            --set-secrets DATABASE_URL=STACKLY_DATABASE_URL:latest,JWT_ACCESS_SECRET=STACKLY_JWT_ACCESS_SECRET:latest,JWT_REFRESH_SECRET=STACKLY_JWT_REFRESH_SECRET:latest,FRONTEND_URL=STACKLY_FRONTEND_URL:latest

      # ── Verify deployment ──
      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "Deployed to: $SERVICE_URL"
          curl --fail "$SERVICE_URL/health" || exit 1